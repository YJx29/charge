<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>极简账本 Pro</title>
    
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5501/5501375.png">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/5501/5501375.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="紫金账本">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --brand-color: #8936F7; }
        body { 
            background-color: #F8F7FF; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .brand-bg { background-color: var(--brand-color); }
        .brand-text { color: var(--brand-color); }
        .glass-card { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(10px); }
        .chart-container { height: 180px; width: 100%; position: relative; }
        input, select { outline: none !important; }
        /* 隐藏滚动条但保留滚动功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-24">
    <div class="max-w-md mx-auto px-5 pt-6 space-y-6">
        
        <div class="brand-bg rounded-[2.5rem] p-7 text-white shadow-2xl shadow-purple-200">
            <div class="flex justify-between items-center mb-6">
                <select id="time-range" onchange="updateUI()" class="bg-white/20 text-xs font-bold rounded-full px-3 py-1 border-none outline-none">
                    <option value="day">今日</option>
                    <option value="month" selected>本月</option>
                    <option value="year">年度</option>
                </select>
                <div class="text-[10px] tracking-widest opacity-60 uppercase font-black" id="display-date">STATISTICS</div>
            </div>

            <div class="space-y-1 mb-6 text-center">
                <p class="text-xs opacity-70">结余金额 (CNY)</p>
                <h2 id="total-balance" class="text-4xl font-black tracking-tight">¥0.00</h2>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-2">
                <div class="glass-card rounded-2xl p-3">
                    <p class="text-[10px] opacity-70 mb-1">总收入</p>
                    <p id="total-inc" class="text-sm font-bold text-green-300">¥0</p>
                </div>
                <div class="glass-card rounded-2xl p-3">
                    <p class="text-[10px] opacity-70 mb-1">总支出</p>
                    <p id="total-exp" class="text-sm font-bold text-red-300">¥0</p>
                </div>
            </div>

            <div class="chart-container pt-4">
                <canvas id="expenseChart"></canvas>
            </div>
        </div>

        <div class="bg-white rounded-3xl p-5 shadow-sm border border-purple-50">
            <form id="transaction-form" class="space-y-4">
                <div class="flex gap-3">
                    <input type="date" id="date" class="flex-1 bg-gray-50 rounded-xl p-3 text-xs font-medium text-gray-600">
                    <select id="category" class="flex-1 bg-gray-50 rounded-xl p-3 text-xs font-medium text-gray-600">
                        <optgroup label="餐饮">
                            <option value="早饭">🥣 早饭</option>
                            <option value="午饭">🍱 午饭</option>
                            <option value="晚饭">🍜 晚饭</option>
                            <option value="水果">🍎 水果</option>
                            <option value="饮品">🥤 饮品/奶茶</option>
                        </optgroup>
                        <optgroup label="日常">
                            <option value="日用品">🧻 日用品</option>
                            <option value="服饰">👕 服饰</option>
                            <option value="交通">🚗 交通</option>
                            <option value="工资">💰 工资收入</option>
                        </optgroup>
                    </select>
                </div>
                <div class="flex gap-3">
                    <input type="text" id="text" placeholder="备注内容" class="flex-[1.5] bg-gray-50 rounded-xl p-3 text-xs">
                    <input type="number" id="amount" step="0.01" placeholder="金额" required class="flex-1 bg-gray-50 rounded-xl p-3 text-xs font-bold brand-text">
                </div>
                <button class="w-full brand-bg text-white py-4 rounded-2xl font-black text-sm shadow-lg shadow-purple-100 active:scale-[0.98] transition-all">
                    确认记账
                </button>
            </form>
        </div>

        <div class="space-y-4">
            <h3 class="text-xs font-black text-gray-400 ml-2 tracking-widest">TRANSACTION HISTORY</h3>
            <div id="history-container" class="space-y-3"></div>
        </div>
    </div>

    <script>
        let transactions = JSON.parse(localStorage.getItem('pro_tracker_v4')) || [];
        let myChart = null;
        document.getElementById('date').valueAsDate = new Date();

        function updateUI() {
            const range = document.getElementById('time-range').value;
            const now = new Date();
            
            const filtered = transactions.filter(t => {
                const d = new Date(t.date);
                if (range === 'day') return d.toDateString() === now.toDateString();
                if (range === 'month') return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
                if (range === 'year') return d.getFullYear() === now.getFullYear();
            });

            const inc = filtered.filter(t => t.amount > 0).reduce((s, t) => s + t.amount, 0);
            const exp = filtered.filter(t => t.amount < 0).reduce((s, t) => s + t.amount, 0);
            
            document.getElementById('total-balance').innerText = `¥${(inc + exp).toFixed(2)}`;
            document.getElementById('total-inc').innerText = `¥${inc.toFixed(2)}`;
            document.getElementById('total-exp').innerText = `¥${Math.abs(exp).toFixed(2)}`;

            const catData = {};
            filtered.filter(t => t.amount < 0).forEach(t => {
                catData[t.category] = (catData[t.category] || 0) + Math.abs(t.amount);
            });

            renderChart(catData);
            renderList();
        }

        function renderChart(data) {
            const ctx = document.getElementById('expenseChart').getContext('2d');
            if (myChart) myChart.destroy();
            
            const hasData = Object.keys(data).length > 0;

            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: hasData ? Object.keys(data) : ['暂无支出'],
                    datasets: [{
                        data: hasData ? Object.values(data) : [0],
                        backgroundColor: 'rgba(255, 255, 255, 0.9)',
                        borderRadius: 10,
                        barThickness: 15
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: { 
                        y: { display: false },
                        x: { grid: { display: false }, ticks: { color: 'rgba(255,255,255,0.8)', font: { size: 9, weight: 'bold' } } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function renderList() {
            const container = document.getElementById('history-container');
            container.innerHTML = '';
            const sorted = [...transactions].sort((a, b) => new Date(b.date) - new Date(a.date));
            const groups = sorted.reduce((acc, t) => {
                if (!acc[t.date]) acc[t.date] = [];
                acc[t.date].push(t);
                return acc;
            }, {});

            for (const date in groups) {
                const section = document.createElement('div');
                section.innerHTML = `
                    <div class="bg-white rounded-[1.5rem] shadow-sm overflow-hidden mb-3">
                        <div class="bg-gray-50/50 px-4 py-2 border-b border-gray-100 flex justify-between items-center">
                            <span class="text-[10px] font-black text-gray-400">${date}</span>
                        </div>
                        <div class="divide-y divide-gray-50">
                            ${groups[date].map(t => `
                                <div class="p-4 flex justify-between items-center active:bg-gray-50 transition-colors">
                                    <div class="flex items-center gap-3">
                                        <div class="w-10 h-10 rounded-full bg-purple-50 flex items-center justify-center text-lg">
                                            ${getEmoji(t.category)}
                                        </div>
                                        <div>
                                            <div class="text-xs font-bold text-gray-800">${t.category}</div>
                                            <div class="text-[10px] text-gray-400">${t.text || '未填写备注'}</div>
                                        </div>
                                    </div>
                                    <div class="flex items-center gap-4">
                                        <span class="text-sm font-black ${t.amount > 0 ? 'text-green-500' : 'text-gray-900'}">
                                            ${t.amount > 0 ? '+' : ''}${t.amount}
                                        </span>
                                        <button onclick="deleteItem(${t.id})" class="text-gray-300 hover:text-red-400">&times;</button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                container.appendChild(section);
            }
        }

        function getEmoji(cat) {
            const map = {'早饭':'🥣','午饭':'🍱','晚饭':'🍜','水果':'🍎','饮品/奶茶':'🥤','日用品':'🧻','服饰':'👕','交通':'🚗','工资':'💰','其他':'❓'};
            return map[cat] || '🏷️';
        }

        document.getElementById('transaction-form').onsubmit = (e) => {
            e.preventDefault();
            const amt = parseFloat(document.getElementById('amount').value);
            const cat = document.getElementById('category').value;
            const newItem = {
                id: Date.now(),
                date: document.getElementById('date').value,
                category: cat,
                text: document.getElementById('text').value,
                amount: (cat !== '工资' && amt > 0) ? -amt : amt
            };
            transactions.push(newItem);
            localStorage.setItem('pro_tracker_v4', JSON.stringify(transactions));
            updateUI();
            e.target.reset();
            document.getElementById('date').valueAsDate = new Date();
        };

        window.deleteItem = (id) => {
            if(confirm('确定要删除这笔记录吗？')) {
                transactions = transactions.filter(t => t.id !== id);
                localStorage.setItem('pro_tracker_v4', JSON.stringify(transactions));
                updateUI();
            }
        };

        updateUI();
    </script>
</body>
</html>
