<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>记账本</title>
<style>
*{box-sizing:border-box;margin:0;padding:0; -webkit-tap-highlight-color:transparent;}
:root{
  --p:#8936F7;--p1:#F3EAFE;--p2:#D9B8FC;--p3:#6B1FD4;
  --inc:#16A34A;--inc-bg:#F0FDF4;--exp:#DC2626;--exp-bg:#FEF2F2;
  --bg:#ffffff;--bg2:#f5f5f7;--t1:#1a1a1a;--t2:#6b7280;
  --bd:rgba(0,0,0,0.08);--bd2:rgba(0,0,0,0.15);
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#1c1c1e;--bg2:#2c2c2e;--t1:#f2f2f7;--t2:#98989f;
    --bd:rgba(255,255,255,0.08);--bd2:rgba(255,255,255,0.15);
    --inc-bg:#052e16;--exp-bg:#450a0a;--p1:#2d1b4e;
  }
}

html,body{height:100%;background:var(--bg);font-family:-apple-system,system-ui,sans-serif;overflow:hidden}
.app{display:flex;flex-direction:column;height:100dvh;background:var(--bg);position:relative;overflow:hidden}

.page{position:absolute;inset:0;display:flex;flex-direction:column;height:100%;background:var(--bg);transition:transform .3s ease;will-change:transform;padding-bottom:85px;}
.page.off-left{transform:translateX(-100%)}
.page.off-right{transform:translateX(100%)}
.page.on{transform:translateX(0)}

.ph{background:var(--p);padding:14px 18px 20px;flex-shrink:0;color:#fff}
.ph-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.ph-title{font-size:18px;font-weight:700}
.hero-bal{font-size:34px;font-weight:800;margin-bottom:12px;letter-spacing:-1px}
.ms{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.msc{background:rgba(255,255,255,0.15);border-radius:12px;padding:10px}
.msc-v{font-size:16px;font-weight:600}

.scroll{flex:1;overflow-y:auto;padding:16px;background:var(--bg)}
.scroll::-webkit-scrollbar{display:none}

.slbl{font-size:11px;color:var(--t2);text-transform:uppercase;margin:18px 0 8px;font-weight:800;letter-spacing:1px}
.cc{background:var(--bg2);border-radius:18px;padding:16px;margin-bottom:16px}

.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.fg label{display:block;font-size:11px;color:var(--t2);margin-bottom:4px;font-weight:600}
.fg input,.fg select{width:100%;padding:12px;border:1px solid var(--bd2);border-radius:14px;font-size:14px;background:var(--bg);color:var(--t1);outline:none}

.seg{display:flex;background:var(--bg2);padding:4px;border-radius:12px;margin-bottom:15px}
.seg-btn{flex:1;border:none;background:none;padding:8px;font-size:12px;font-weight:600;color:var(--t2);border-radius:10px;cursor:pointer}
.seg-btn.on{background:var(--bg);color:var(--p);box-shadow:0 2px 8px rgba(0,0,0,0.05)}

.abtn{width:100%;padding:15px;background:var(--p);color:#fff;border:none;border-radius:16px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:10px}
.abtn-sec{background:var(--bg);color:var(--t1);border:1px solid var(--bd2)}

/* 预算进度条 */
.br-item{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--bd)}
.br-label{font-size:14px;width:55px;font-weight:600}
.br-progress-bg{flex:1;background:var(--bg);height:10px;border-radius:5px;overflow:hidden;border:1px solid var(--bd)}
.br-progress-fill{height:100%;background:var(--p);transition:width 0.5s ease}
.br-progress-fill.warning{background:var(--exp)}
.br-info{font-size:11px;color:var(--t2);width:110px;text-align:right}

/* 导航 */
.bnav{background:var(--bg);border-top:1px solid var(--bd);display:flex;width:100%;position:fixed;bottom:0;z-index:999;padding-bottom:max(12px,env(safe-area-inset-bottom))}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px;border:none;background:none;cursor:pointer;color:var(--t2)}
.nb svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:2.2;margin-bottom:3px}
.nb span{font-size:10px;font-weight:600}
.nb.on{color:var(--p)}

.live-tag{background:#FFD700;color:#000;font-size:9px;padding:1px 5px;border-radius:5px;margin-left:6px;vertical-align:middle;animation:pulse 1s infinite}
@keyframes pulse{ 0%{opacity:1} 50%{opacity:0.6} 100%{opacity:1} }
</style>
</head>
<body>

<div class="app">
  <div id="pg-record" class="page on">
    <div class="ph">
      <div class="ph-row"><span class="ph-title">紫金账本 Pro <span id="live-tag" class="live-tag" style="display:none">LIVE</span></span></div>
      <div class="hero-bal" id="bal">¥0.00</div>
      <div class="ms">
        <div class="msc"><div class="msc-v" id="sinc">¥0</div><div style="font-size:10px;opacity:0.8">本月收入</div></div>
        <div class="msc"><div class="msc-v" id="sexp">¥0</div><div style="font-size:10px;opacity:0.8">本月支出</div></div>
      </div>
    </div>
    <div class="scroll">
      <div class="fgrid">
        <div class="fg"><label>金额 (¥)</label><input type="number" id="amt" placeholder="0.00" inputmode="decimal"></div>
        <div class="fg"><label>分类</label><select id="cat"></select></div>
      </div>
      <div class="fgrid">
        <div class="fg"><label>备注</label><input type="text" id="note" placeholder="可选备注..."></div>
        <div class="fg"><label>日期</label><input type="date" id="dt"></div>
      </div>
      <button class="abtn" onclick="addTx()">＋ 立即入账</button>
      <div id="txList"></div>
    </div>
  </div>

  <div id="pg-charts" class="page off-right">
    <div class="ph"><div class="ph-row"><span class="ph-title">全景占比分析</span></div></div>
    <div class="scroll">
      <div class="seg">
        <button class="seg-btn on" id="seg-exp" onclick="switchChart('expense')">支出占比</button>
        <button class="seg-btn" id="seg-inc" onclick="switchChart('income')">收入占比</button>
      </div>
      <div class="cc">
        <div style="width:100%; max-width:180px; aspect-ratio:1; margin:0 auto 15px; position:relative">
          <canvas id="pieChart"></canvas>
          <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none">
            <div id="pieCenterLabel" style="font-size:10px;color:var(--t2)">总支出</div>
            <div id="pieCenterTotal" style="font-weight:bold;font-size:14px;color:var(--t1)">¥0</div>
          </div>
        </div>
        <div id="pieLegendArea"></div>
      </div>
    </div>
  </div>

  <div id="pg-budget" class="page off-right">
    <div class="ph"><div class="ph-row"><span class="ph-title">预算管理</span></div></div>
    <div class="scroll">
      <div class="slbl">支出进度</div>
      <div class="cc" id="budList"></div>
      <div class="slbl">预算配置</div>
      <div class="cc" id="budEditArea"></div>
      <button class="abtn" onclick="saveBud()">保存配置</button>
    </div>
  </div>

  <div id="pg-more" class="page off-right">
    <div class="ph"><div class="ph-row"><span class="ph-title">报表与工具</span></div></div>
    <div class="scroll">
      <div class="slbl">报表打印中心</div>
      <div class="cc">
        <button class="abtn" style="background:#0EA5E9" onclick="printReport('month')">🖨️ 打印本月账单 (PDF)</button>
        <button class="abtn" style="background:#6366F1" onclick="printReport('year')">📅 打印本年账单 (PDF)</button>
      </div>
      <div class="slbl">数据导出</div>
      <div class="cc">
        <button class="abtn abtn-sec" onclick="expCSV()">导出 CSV 格式明细</button>
      </div>
      <div class="slbl" style="color:var(--exp)">系统设置</div>
      <div class="cc">
        <button class="abtn" style="background:var(--exp)" onclick="clearData()">清空所有数据</button>
      </div>
    </div>
  </div>

  <nav class="bnav">
    <button class="nb on" id="nb-record" onclick="gp('record')"><svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/></svg><span>明细</span></button>
    <button class="nb" id="nb-charts" onclick="gp('charts')"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 12L12 6"/></svg><span>占比</span></button>
    <button class="nb" id="nb-budget" onclick="gp('budget')"><svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/></svg><span>预算</span></button>
    <button class="nb" id="nb-more" onclick="gp('more')"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/></svg><span>报表</span></button>
  </nav>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const CATS = { expense: ['餐饮','购物','交通','娱乐','居家','医疗','教育','人情','其他'], income: ['工资','奖金','理财','其他'] };
const COLORS = ['#8936F7','#16A34A','#DC2626','#F59E0B','#0EA5E9','#EC4899','#10B981','#6366F1','#F43F5E'];

let txs = JSON.parse(localStorage.getItem('la_t_pro') || '[]');
let buds = JSON.parse(localStorage.getItem('la_b_pro') || '{}');
let cPage = 'record', cM = new Date(), pChart = null, chartMode = 'expense';

document.getElementById('amt').oninput = () => render();
document.getElementById('cat').onchange = () => render();

function gp(p) {
    document.getElementById('pg-'+cPage).className = 'page ' + (p==='record'?'off-right':'off-left');
    cPage = p;
    document.getElementById('pg-'+p).className = 'page on';
    document.querySelectorAll('.nb').forEach(n => n.classList.toggle('on', n.id==='nb-'+p));
    if(p === 'charts') setTimeout(render, 50);
    else render();
}

function switchChart(mode) {
    chartMode = mode;
    document.getElementById('seg-exp').classList.toggle('on', mode === 'expense');
    document.getElementById('seg-inc').classList.toggle('on', mode === 'income');
    document.getElementById('pieCenterLabel').textContent = mode === 'expense' ? '总支出' : '总收入';
    render();
}

function render() {
    const curMonth = cM.getFullYear() + '-' + String(cM.getMonth()+1).padStart(2,'0');
    const mt = txs.filter(t => t.date.startsWith(curMonth));
    const lAmt = parseFloat(document.getElementById('amt').value) || 0;
    const lCat = document.getElementById('cat').value;
    document.getElementById('live-tag').style.display = lAmt > 0 ? 'inline-block' : 'none';
    let inc = mt.filter(t => t.type==='income').reduce((s,t)=>s+t.amount, 0);
    let exp = mt.filter(t => t.type==='expense').reduce((s,t)=>s+t.amount, 0);
    if(lAmt > 0) { if(CATS.income.includes(lCat)) inc += lAmt; else exp += lAmt; }
    document.getElementById('bal').textContent = '¥' + (inc - exp).toFixed(2);
    document.getElementById('sinc').textContent = '¥' + inc.toFixed(2);
    document.getElementById('sexp').textContent = '¥' + exp.toFixed(2);
    rTxList(mt);
    if(cPage==='charts') rPie(mt, lAmt, lCat);
    if(cPage==='budget') rBudget(mt, lAmt, lCat);
}

function rTxList(mt) {
    document.getElementById('txList').innerHTML = mt.slice(0,10).map(t => `
        <div style="display:flex;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--bd);font-size:13px">
            <div><div style="font-weight:600">${t.category}</div><div style="font-size:10px;color:var(--t2)">${t.date}</div></div>
            <div style="font-weight:700;color:${t.type==='income'?'var(--inc)':'var(--exp)'}">${t.type==='income'?'+':'-'}${t.amount.toFixed(2)}</div>
        </div>`).join('');
}

function rPie(mt, lAmt, lCat) {
    const dataMap = {};
    mt.filter(t => t.type === chartMode).forEach(t => dataMap[t.category] = (dataMap[t.category]||0)+t.amount);
    if(lAmt > 0 && CATS[chartMode].includes(lCat)) dataMap[lCat] = (dataMap[lCat]||0)+lAmt;
    const labels = Object.keys(dataMap), vals = Object.values(dataMap), total = vals.reduce((a,b)=>a+b, 0);
    document.getElementById('pieCenterTotal').textContent = '¥' + total.toFixed(0);
    const ctx = document.getElementById('pieChart'); if(!ctx) return;
    if(pChart) pChart.destroy();
    if(total === 0) { document.getElementById('pieLegendArea').innerHTML = '<p style="text-align:center;padding:20px;color:#999">无数据</p>'; return; }
    pChart = new Chart(ctx, { type:'doughnut', data:{ labels, datasets:[{ data:vals, backgroundColor:COLORS, borderWidth:0 }] }, options:{ plugins:{ legend:{ display:false } }, cutout:'75%', responsive:true, maintainAspectRatio:false } });
    document.getElementById('pieLegendArea').innerHTML = labels.map((l,i) => `<div class="leg-item"><div class="leg-left"><span class="leg-dot" style="background:${COLORS[i%COLORS.length]}"></span><span>${l}<span class="leg-per">${(vals[i]/total*100).toFixed(1)}%</span></span></div><div style="font-weight:600">¥${vals[i].toFixed(2)}</div></div>`).join('');
}

function rBudget(mt, lAmt, lCat) {
    const spent = {}; mt.filter(t => t.type==='expense').forEach(t => spent[t.category] = (spent[t.category]||0)+t.amount);
    if(lAmt > 0 && CATS.expense.includes(lCat)) spent[lCat] = (spent[lCat]||0)+lAmt;
    document.getElementById('budList').innerHTML = CATS.expense.map(c => {
        const b = buds[c] || 0, s = spent[c] || 0, realPer = b ? (s/b*100) : 0;
        if(!b && !s) return ''; 
        return `<div class="br-item"><div class="br-label">${c}</div><div class="br-progress-bg"><div class="br-progress-fill ${realPer>=100?'warning':''}" style="width:${Math.min(realPer,100)}%"></div></div><div class="br-info"><span style="font-weight:bold;font-size:11px;color:${realPer>=100?'var(--exp)':''}">${realPer.toFixed(1)}%</span><br>¥${s.toFixed(0)}/${b?b:'-'}</div></div>`;
    }).join('') || '<p style="text-align:center;padding:20px;font-size:12px;color:var(--t2)">尚未设置预算</p>';
    const editArea = document.getElementById('budEditArea');
    if(!editArea.innerHTML) editArea.innerHTML = CATS.expense.map(c => `<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px"><label style="width:60px;font-size:13px">${c}</label><input type="number" class="bud-in" data-cat="${c}" value="${buds[c]||''}" style="flex:1;padding:8px;border-radius:10px;border:1px solid var(--bd);background:var(--bg)"></div>`).join('');
}

function saveBud() {
    document.querySelectorAll('.bud-in').forEach(el => { const v = parseFloat(el.value); if(v > 0) buds[el.dataset.cat] = v; else delete buds[el.dataset.cat]; });
    localStorage.setItem('la_b_pro', JSON.stringify(buds)); alert('预算已更新！'); render();
}

function addTx() {
    const a = parseFloat(document.getElementById('amt').value), d = document.getElementById('dt').value;
    if(!a || !d) return alert('必填项缺失');
    const cat = document.getElementById('cat').value;
    txs.unshift({ id:Date.now(), type: CATS.income.includes(cat)?'income':'expense', amount:a, category:cat, note:document.getElementById('note').value, date:d });
    localStorage.setItem('la_t_pro', JSON.stringify(txs)); document.getElementById('amt').value = ''; render();
}

// --- 核心修复：打印本月/本年功能 ---
function printReport(range) {
    const now = new Date();
    const filterKey = range === 'month' ? now.toISOString().slice(0, 7) : now.getFullYear().toString();
    const data = txs.filter(t => t.date.startsWith(filterKey)).sort((a,b) => b.date.localeCompare(a.date));
    
    if(!data.length) return alert('该周期内暂无账单数据！');

    let inc = 0, exp = 0;
    const rows = data.map(t => {
        if(t.type==='income') inc += t.amount; else exp += t.amount;
        return `<tr><td>${t.date}</td><td>${t.type==='income'?'收入':'支出'}</td><td>${t.category}</td><td>${t.note||'-'}</td><td style="color:${t.type==='income'?'#16A34A':'#DC2626'}">${t.type==='income'?'+':'-'}${t.amount.toFixed(2)}</td></tr>`;
    }).join('');

    const win = window.open('', '_blank');
    win.document.write(`
        <html><head><title>紫金账本-报表打印</title>
        <style>
            body{font-family:sans-serif;padding:30px;color:#333}
            h2{text-align:center;color:#8936F7;margin-bottom:5px}
            .meta{text-align:center;font-size:12px;color:#666;margin-bottom:20px}
            table{width:100%;border-collapse:collapse;margin-top:20px}
            th,td{border:1px solid #eee;padding:12px;text-align:left;font-size:13px}
            th{background:#f9f9f9;font-weight:bold}
            .summary{margin-top:30px;padding:20px;background:#f4f0ff;border-radius:8px;display:flex;justify-content:space-around}
            .sum-item b{font-size:18px;color:#8936F7}
        </style></head>
        <body>
            <h2>${range==='month'?'月度':'年度'}收支财务报表</h2>
            <div class="meta">统计周期: ${filterKey} | 打印时间: ${new Date().toLocaleString()}</div>
            <table>
                <thead><tr><th>日期</th><th>类型</th><th>分类</th><th>备注</th><th>金额</th></tr></thead>
                <tbody>${rows}</tbody>
            </table>
            <div class="summary">
                <div class="sum-item">总收入<br><b>¥${inc.toFixed(2)}</b></div>
                <div class="sum-item">总支出<br><b>¥${exp.toFixed(2)}</b></div>
                <div class="sum-item">净结余<br><b>¥${(inc-exp).toFixed(2)}</b></div>
            </div>
        </body></html>
    `);
    win.document.close();
    win.print();
}

function expCSV() {
    let csv = '\uFEFF日期,类型,分类,备注,金额\n';
    txs.forEach(t => csv += `${t.date},${t.type},${t.category},${t.note||''},${t.amount}\n`);
    const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'})); a.download = `账单导出.csv`; a.click();
}

function clearData() { if(confirm('数据清空后不可恢复，确定吗？')) { localStorage.clear(); location.reload(); } }

document.getElementById('dt').valueAsDate = new Date();
document.getElementById('cat').innerHTML = [...CATS.expense, ...CATS.income].map(c => `<option>${c}</option>`).join('');
render();
</script>
</body>
</html>
