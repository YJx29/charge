<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的智能记账本</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* 优化手机端点击体验 */
        button, select, input { touch-action: manipulation; }
        .chart-container { position: relative; height: 200px; width: 100%; }
    </style>
</head>
<body class="bg-slate-50 pb-10">
    <div class="max-w-md mx-auto p-4 space-y-4">
        
        <div class="bg-indigo-600 rounded-3xl p-6 text-white shadow-xl">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <p id="month-label" class="text-xs opacity-70">本月结余</p>
                    <h2 id="month-balance" class="text-3xl font-bold">¥0.00</h2>
                </div>
                <div class="text-right">
                    <p class="text-xs opacity-70">总支出</p>
                    <p id="month-expense" class="text-lg font-semibold text-red-200">¥0.00</p>
                </div>
            </div>
            
            <div class="bg-white/10 rounded-2xl p-4 chart-container">
                <canvas id="expenseChart"></canvas>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm p-5">
            <form id="transaction-form" class="space-y-4">
                <div class="flex gap-2">
                    <input type="date" id="date" class="flex-1 border-gray-200 border rounded-xl p-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    <select id="category" class="flex-1 border-gray-200 border rounded-xl p-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        <option value="午饭">🍱 午饭</option>
                        <option value="饮品">🥤 饮品</option>
                        <option value="奶茶咖啡">☕ 奶茶咖啡</option>
                        <option value="日用品">🧻 日用品</option>
                        <option value="服饰">👕 服饰</option>
                        <option value="工资">💰 工资收入</option>
                        <option value="其他">❓ 其他</option>
                    </select>
                </div>
                <div class="flex gap-2">
                    <input type="text" id="text" placeholder="备注" class="flex-[2] border-gray-200 border rounded-xl p-2 text-sm">
                    <input type="number" id="amount" step="0.01" placeholder="金额" required class="flex-1 border-gray-200 border rounded-xl p-2 text-sm">
                </div>
                <button class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold shadow-lg shadow-indigo-200 active:scale-95 transition-transform">
                    确认记录
                </button>
            </form>
        </div>

        <div id="history-container" class="space-y-3">
            </div>
    </div>

    <script>
        let transactions = JSON.parse(localStorage.getItem('pro_tracker_v2')) || [];
        let myChart = null;

        // 初始化日期
        document.getElementById('date').valueAsDate = new Date();

        function updateUI() {
            renderStats();
            renderList();
            updateChart();
        }

        function renderStats() {
            const now = new Date();
            const monthData = transactions.filter(t => {
                const d = new Date(t.date);
                return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
            });

            const income = monthData.filter(t => t.amount > 0).reduce((s, t) => s + t.amount, 0);
            const expense = monthData.filter(t => t.amount < 0).reduce((s, t) => s + t.amount, 0);

            document.getElementById('month-balance').innerText = `¥${(income + expense).toFixed(2)}`;
            document.getElementById('month-expense').innerText = `¥${Math.abs(expense).toFixed(2)}`;
            document.getElementById('month-label').innerText = `${now.getMonth() + 1}月结余`;
        }

        function updateChart() {
            const now = new Date();
            const expenseData = transactions.filter(t => {
                const d = new Date(t.date);
                return d.getMonth() === now.getMonth() && d.amount < 0;
            });

            const categories = {};
            expenseData.forEach(t => {
                categories[t.category] = (categories[t.category] || 0) + Math.abs(t.amount);
            });

            const ctx = document.getElementById('expenseChart').getContext('2d');
            
            if (myChart) myChart.destroy(); // 销毁旧图表防止重叠

            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(categories),
                    datasets: [{
                        data: Object.values(categories),
                        backgroundColor: ['#fbbf24', '#f87171', '#60a5fa', '#34d399', '#a78bfa', '#fb923c'],
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'right', labels: { color: '#ffffff', font: { size: 10 } } }
                    }
                }
            });
        }

        function renderList() {
            const container = document.getElementById('history-container');
            container.innerHTML = '';
            const sorted = [...transactions].sort((a, b) => new Date(b.date) - new Date(a.date));
            const groups = sorted.reduce((acc, t) => {
                if (!acc[t.date]) acc[t.date] = [];
                acc[t.date].push(t);
                return acc;
            }, {});

            for (const date in groups) {
                const section = document.createElement('div');
                section.innerHTML = `
                    <div class="text-xs text-gray-400 font-bold ml-2 mb-1 uppercase tracking-wider">${date}</div>
                    <div class="bg-white rounded-2xl shadow-sm divide-y">
                        ${groups[date].map(t => `
                            <div class="p-4 flex justify-between items-center">
                                <div>
                                    <div class="text-sm font-bold text-gray-700">${t.category}</div>
                                    <div class="text-xs text-gray-400">${t.text || '日常支出'}</div>
                                </div>
                                <div class="flex items-center gap-3">
                                    <span class="font-bold ${t.amount > 0 ? 'text-green-500' : 'text-gray-800'}">
                                        ${t.amount > 0 ? '+' : ''}${t.amount}
                                    </span>
                                    <button onclick="deleteItem(${t.id})" class="text-gray-200 hover:text-red-400 text-xl">&times;</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(section);
            }
        }

        document.getElementById('transaction-form').onsubmit = (e) => {
            e.preventDefault();
            const amountVal = parseFloat(document.getElementById('amount').value);
            // 简单逻辑：除了工资都视为支出（负数）
            const finalAmount = (document.getElementById('category').value !== '工资' && amountVal > 0) ? -amountVal : amountVal;

            const newItem = {
                id: Date.now(),
                date: document.getElementById('date').value,
                category: document.getElementById('category').value,
                text: document.getElementById('text').value,
                amount: finalAmount
            };
            transactions.push(newItem);
            localStorage.setItem('pro_tracker_v2', JSON.stringify(transactions));
            updateUI();
            e.target.reset();
            document.getElementById('date').valueAsDate = new Date();
        };

        window.deleteItem = (id) => {
            transactions = transactions.filter(t => t.id !== id);
            localStorage.setItem('pro_tracker_v2', JSON.stringify(transactions));
            updateUI();
        };

        updateUI();
    </script>
</body>
</html>
